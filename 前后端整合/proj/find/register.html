<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 页面 head 区：放元信息、标题和样式引用 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光 FIND - 注册</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- 说明：本页面已补充为详注释版。
         头部导航、主体内容、页脚都与其他页面保持统一风格。 -->
    <div class="header">
        <div class="logo-area">
            <img src="img/smalllogo.png" alt="拾光 Logo" class="logo">
            <div class="slogan-text">拾得美好，寻回温暖</div>
        </div>
        <div class="nav-menu">
            <a href="home.html">首页</a>
            <a href="claim.html">我要招领</a>
            <a href="lost.html">我要寻物</a>
            <a href="search.html">智能检索</a>
            <a href="public.html">最新公示</a>
        </div>
        <div class="user-area">
            <img src="img/me.png" alt="用户图标" class="user-icon">
            <a href="my.html">我的</a>
            <a href="register.html" class="active">注册</a>
            <span class="divider">/</span>
            <a href="login.html">登录</a>
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-title">用户注册</div>
        <form id="registerForm" class="auth-form">
            <input id="registerUsername" class="auth-input" type="text" placeholder="请输入用户名" required>
            <input id="registerStudentNo" class="auth-input" type="text" placeholder="请输入学号（可选）">
            <input id="registerPassword" class="auth-input" type="password" placeholder="请输入不少于 6 位的密码" required>
            <button class="auth-submit" type="submit">注册并登录</button>
        </form>
        <div class="auth-tip">已有账号？<a href="login.html">去登录</a></div>
    </div>

    <div class="footer">
        <p>© 2025 拾光 FIND 版权所有</p>
        <div class="footer-links">
            <a href="public.html">关于我们</a> | <a href="notice.html">隐私政策</a>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
