<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光 FIND - 首页</title>

    <!-- 公共样式 + 首页样式 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/home.css">

    <!-- 本地字体回退定义：如果系统存在这些字体，就优先使用 -->
    <style>
        @font-face {
            font-family: 'ShouXieFont';
            src: local('KaiTi'), local('STKaiti'), local('华文楷体'), local('楷体');
        }
        @font-face {
            font-family: 'BubbleFont';
            src: local('STHeiti'), local('微软雅黑'), local('SimHei'), local('黑体');
        }
    </style>
</head>
<body>
    <!-- ==================== 头部导航 ==================== -->
    <div class="header">
        <div class="logo-area">
            <img src="img/smalllogo.png" alt="拾光 Logo" class="logo">
            <div class="slogan-text">拾得美好，寻回温暖</div>
        </div>

        <!-- 中间导航栏 -->
        <div class="nav-menu">
            <a href="home.html" class="active">首页</a>
            <a href="claim.html">我要招领</a>
            <a href="lost.html">我要寻物</a>
            <a href="search.html">智能检索</a>
            <a href="public.html">最新公示</a>
        </div>

        <!-- 右上角用户区，common.js 会按登录状态动态重绘 -->
        <div class="user-area">
            <img src="img/me.png" alt="用户图标" class="user-icon">
            <a href="my.html">我的</a>
            <a href="register.html">注册</a>
            <span class="divider">/</span>
            <a href="login.html">登录</a>
        </div>
    </div>

    <!-- ==================== 功能四宫格 ==================== -->
    <div class="function-grid">
        <div class="function-card" onclick="jumpToPage('claim.html')">
            <img src="img/zhaoling.png" alt="我要招领" class="card-img">
            <div class="title">我要招领</div>
        </div>

        <div class="function-card" onclick="jumpToPage('lost.html')">
            <img src="img/fdj.png" alt="我要寻物" class="card-img">
            <div class="title">我要寻物</div>
        </div>

        <div class="function-card" onclick="jumpToPage('search.html')">
            <img src="img/location.png" alt="智能检索" class="card-img">
            <div class="title">智能检索</div>
        </div>

        <div class="function-card" onclick="jumpToPage('public.html')">
            <img src="img/book.png" alt="最新公示" class="card-img">
            <div class="title">最新公示</div>
        </div>
    </div>

    <!-- ==================== 页脚 ==================== -->
    <div class="footer">
        <p>© 2025 拾光 FIND 版权所有</p>
        <div class="footer-links">
            <a href="public.html">关于我们</a> | <a href="notice.html">隐私政策</a>
        </div>
    </div>

    <script src="js/common.js"></script>
</body>
</html>
