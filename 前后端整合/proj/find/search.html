<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 页面 head 区：放元信息、标题和样式引用 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光 FIND - 智能检索</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
    <!-- 说明：本页面已补充为详注释版。
         头部导航、主体内容、页脚都与其他页面保持统一风格。 -->
    <div class="header">
        <div class="logo-area">
            <img src="img/smalllogo.png" alt="拾光 Logo" class="logo">
            <div class="slogan-text">拾得美好，寻回温暖</div>
        </div>
        <div class="nav-menu">
            <a href="home.html">首页</a>
            <a href="claim.html">我要招领</a>
            <a href="lost.html">我要寻物</a>
            <a href="search.html" class="active">智能检索</a>
            <a href="public.html">最新公示</a>
        </div>
        <div class="user-area">
            <img src="img/me.png" alt="用户图标" class="user-icon">
            <a href="my.html">我的</a>
            <a href="register.html">注册</a>
            <span class="divider">/</span>
            <a href="login.html">登录</a>
        </div>
    </div>

    <div class="page-title">
        <img src="img/location.png" alt="智能检索图标">
        智能检索
    </div>

    <div class="search-panel">
        <div class="search-row">
            <input id="keyword" class="search-input" type="text" placeholder="输入关键词，如：校园卡 / 图书馆 / 耳机">
            <select id="typeFilter" class="search-select">
                <option value="">全部类型</option>
                <option value="lost">寻物</option>
                <option value="found">招领</option>
            </select>
            <select id="statusFilter" class="search-select">
                <option value="">全部状态</option>
                <option value="searching">寻物中</option>
                <option value="claim_open">招领中</option>
                <option value="returned">已归还</option>
            </select>
            <button id="searchBtn" class="search-btn">立即检索</button>
        </div>
    </div>

    <div class="result-wrap">
        <div id="resultCount" class="result-count">正在加载...</div>
        <div id="resultList" class="result-list"></div>
    </div>

    <div class="footer">
        <p>© 2025 拾光 FIND 版权所有</p>
        <div class="footer-links">
            <a href="public.html">关于我们</a> | <a href="notice.html">隐私政策</a>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
